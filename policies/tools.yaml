# Tool classification and per-environment deny lists.
#
# `classes` assigns every tool a class. The class controls which phase a tool is
# exposed in (see internal/governance/phase.go). Tools NOT listed here default
# to the most restricted class (action_execute) so they fail closed.
#
# `environments[*].deny` hard-denies tools in an environment regardless of phase
# or approval.
classes:
  read:
    - read
    - ls
    - glob
    - grep
    - log_search
    - reference_detection
    - validate_detection
    - test_detection
  case_write:
    - open_case
    - record_evidence
    - write_case_page
    - record_finding
    - store_hunt
    - record_intel
    - link_artifacts
  control:
    - propose_action
    - submit_for_approval
  action_execute:
    - slack_notify
    - bash
    - write
    - edit
    - ntn

environments:
  dev:
    deny: []
  prod:
    deny:
      - bash
      - write
      - edit
      - ntn

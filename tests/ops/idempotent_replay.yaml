name: idempotent_replay
env: dev
alert:
  alert_id: A-1003
  source: cloudtrail
  severity: high
  raw: "Root account used interactively"
steps:
  - phase: evidence
    tool: record_evidence
    input:
      claim: "Root console login from 198.51.100.4"
      source: query
      pointer: "logq_rootlogin"
      confidence: confirmed
    capture_evidence_as: e1
  # Propose the SAME action twice (replay/reorder). The deterministic ActionID
  # collapses them to one proposal, and the ledger executes it at most once.
  - phase: propose
    tool: propose_action
    input:
      tool: slack_notify
      input: { message: "Root account used — confirm break-glass" }
      rationale: "Alert responders to root usage"
      evidence_ids: ["$e1"]
  - phase: propose
    tool: propose_action
    input:
      tool: slack_notify
      input: { message: "Root account used — confirm break-glass" }
      rationale: "Alert responders to root usage"
      evidence_ids: ["$e1"]
  - phase: propose
    tool: submit_for_approval
    input: {}
expect:
  executed: [slack_notify]
  single_execution: [slack_notify]
  evidence_min: 1

name: evidenceless_claim_rejected
env: dev
alert:
  alert_id: A-1004
  source: cloudtrail
  severity: low
  raw: "Suspicious IAM key creation"
steps:
  - phase: evidence
    tool: record_evidence
    input:
      claim: "AccessKey created for service account svc-deploy"
      source: query
      pointer: "logq_createkey"
      confidence: confirmed
    capture_evidence_as: e1
# The narrative makes one evidence-backed claim and one unsupported claim that is
# NOT marked as a hypothesis. The case-page lint must flag it.
case_page:
  summary:
    - text: "An access key was created for svc-deploy."
      evidence: ["$e1"]
    - text: "The attacker has persisted in the environment."
      evidence: []
expect:
  evidence_min: 1
  case_page_clean: false   # the unsupported claim must be flagged
